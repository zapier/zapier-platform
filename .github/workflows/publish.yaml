name: Publish

on:
  push:
    branches:
      - 'main'
    paths:
      - 'packages/*/package.json'

jobs:
  check:
    name: Check for unpublished versions
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check-publish.outputs.should_publish }}
      schema_needs_publish: ${{ steps.check-publish.outputs.schema_needs_publish }}
      core_needs_publish: ${{ steps.check-publish.outputs.core_needs_publish }}
      cli_needs_publish: ${{ steps.check-publish.outputs.cli_needs_publish }}
      lsr_needs_publish: ${{ steps.check-publish.outputs.lsr_needs_publish }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Compare local vs published versions
        id: check-publish
        run: ./scripts/check-publish.sh

  publish:
    name: Publish to npm
    needs: check
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Configure AWS credentials
        if: needs.check.outputs.core_needs_publish == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::996097627176:role/zapier-platform-github-actions-production
          aws-region: us-east-1

      - name: Build and upload boilerplate zip
        if: needs.check.outputs.core_needs_publish == 'true'
        run: |
          CORE_VERSION=$(jq -r '.version' packages/core/package.json)
          if aws s3 ls "s3://zapier-dev-platform-cli-boilerplates/$CORE_VERSION.zip" 2>/dev/null; then
            echo "Skipping boilerplate (already uploaded)"
          else
            echo "Building and uploading boilerplate"
            cd boilerplate
            ./scripts/build.sh
            aws s3 cp "build/$CORE_VERSION.zip" "s3://zapier-dev-platform-cli-boilerplates/$CORE_VERSION.zip"
          fi

      - name: Publish zapier-platform-schema
        if: needs.check.outputs.schema_needs_publish == 'true'
        run: pnpm publish --provenance --no-git-checks
        working-directory: packages/schema

      - name: Publish zapier-platform-core
        if: needs.check.outputs.core_needs_publish == 'true'
        run: pnpm publish --provenance --no-git-checks
        working-directory: packages/core

      - name: Publish zapier-platform-cli
        if: needs.check.outputs.cli_needs_publish == 'true'
        run: pnpm publish --provenance --no-git-checks
        working-directory: packages/cli

      - name: Publish zapier-platform-legacy-scripting-runner
        if: needs.check.outputs.lsr_needs_publish == 'true'
        run: pnpm publish --provenance --no-git-checks
        working-directory: packages/legacy-scripting-runner
